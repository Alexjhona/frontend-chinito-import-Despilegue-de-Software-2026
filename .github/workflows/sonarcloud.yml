name: SonarCloud Frontend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sonarcloud:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Verify coverage file
        shell: bash
        run: |
          test -s coverage/ng-menu-dashboard/lcov.info
          echo "Coverage file found: coverage/ng-menu-dashboard/lcov.info"

      - name: Validate SonarCloud configuration
        shell: bash
        env:
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          test -n "$SONAR_ORGANIZATION" || {
            echo "::error::Repository variable SONAR_ORGANIZATION is not configured."
            exit 1
          }
          test -n "$SONAR_TOKEN" || {
            echo "::error::Repository secret SONAR_TOKEN is not configured."
            exit 1
          }

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
