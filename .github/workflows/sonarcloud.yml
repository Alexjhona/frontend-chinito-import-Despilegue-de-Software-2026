name: SonarCloud Frontend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sonarcloud:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Validate SonarCloud configuration and coverage
        shell: bash
        env:
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          echo "SonarCloud organization: ${SONAR_ORGANIZATION:-<not configured>}"
          echo "sonar-project.properties:"
          cat sonar-project.properties

          echo "Coverage file:"
          ls -lh coverage/ng-menu-dashboard/lcov.info
          test -s coverage/ng-menu-dashboard/lcov.info || {
            echo "::error::coverage/ng-menu-dashboard/lcov.info is missing or empty."
            exit 1
          }

          test -n "$SONAR_ORGANIZATION" || {
            echo "::error::Repository variable SONAR_ORGANIZATION is not configured."
            exit 1
          }
          test -n "$SONAR_TOKEN" || {
            echo "::error::Repository secret SONAR_TOKEN is not configured."
            exit 1
          }
          echo "SONAR_TOKEN is configured."

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.projectKey=frontend-chinito-import
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.javascript.lcov.reportPaths=coverage/ng-menu-dashboard/lcov.info
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
