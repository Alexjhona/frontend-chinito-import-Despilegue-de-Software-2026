<p class="text-lg font-bold mb-2">Categorías</p>
<button class="bg-blue-600 text-white px-4 py-2 rounded mb-4" (click)="nuevaCategoria()">Nueva Categoría</button>

<!-- Buscador con lupa -->
<div class="flex items-center mb-4">
  <input
    type="text"
    class="border rounded-l w-[400px] h-[40px] p-2"
    placeholder="Buscar categoría..."
    [(ngModel)]="busqueda"
  />
  <span class="bg-gray-200 px-3 py-2 rounded-r h-[40px] flex items-center">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-gray-700">
      <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M10.5 18a7.5 7.5 0 100-15 7.5 7.5 0 000 15z" />
    </svg>
  </span>
</div>

<!-- Formulario -->
<div *ngIf="mostrarFormulario" class="bg-gray-100 p-4 rounded shadow mb-4">
  <h3 class="text-lg font-bold mb-2">{{ editCategoria ? 'Editar Categoría' : 'Nueva Categoría' }}</h3>
  <form (ngSubmit)="guardar()" #categoriaForm="ngForm">
    <input class="border p-2 mb-2 w-full" type="text" [(ngModel)]="formCategoria.nombre" name="nombre" placeholder="Nombre de la categoría" required>
    <button class="bg-green-600 text-white px-4 py-2 rounded mr-2" type="submit">Guardar</button>
    <button class="bg-red-600 text-white px-4 py-2 rounded" type="button" (click)="cancelar()">Cancelar</button>
  </form>
</div>

<!-- Tabla de categorías -->
<table class="table-auto w-full mt-4 border">
  <thead>
  <tr class="bg-gray-200">
    <th class="px-4 py-2">ID</th>
    <th class="px-4 py-2">Nombre</th>
    <th class="px-4 py-2">Acciones</th>
  </tr>
  </thead>
  <tbody>
  <tr *ngFor="let categoria of categoriasFiltradas" class="border-t">
    <td class="px-4 py-2">{{ categoria.id }}</td>
    <td class="px-4 py-2">{{ categoria.nombre }}</td>
    <td class="px-4 py-2">
      <button class="bg-green-600 text-white px-2 py-1 rounded mr-2" (click)="editar(categoria)">Editar</button>
      <button class="bg-red-600 text-white px-2 py-1 rounded" (click)="eliminarCategoria(categoria.id)">Eliminar</button>
    </td>
  </tr>
  </tbody>
</table>
