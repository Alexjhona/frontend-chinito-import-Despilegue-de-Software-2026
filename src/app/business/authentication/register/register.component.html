<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-celeste-100 to-celeste-200">

  <!-- Card principal -->
  <div class="backdrop-blur-xl bg-white/60 shadow-2xl rounded-3xl p-10 w-[360px] border border-white/30">

    <!-- Header -->
    <div class="mb-8 text-center">
      <h1 class="text-3xl font-semibold text-black">Crea tu cuenta</h1>
      <p class="text-gray-600 text-sm mt-1">
        Registra un nuevo usuario para acceder al sistema Chinito Importaciones.
      </p>
    </div>

    <!-- Formulario -->
    <div class="space-y-5">

      <!-- Usuario -->
      <input
        [(ngModel)]="user"
        type="text"
        placeholder="Usuario"
        class="w-full px-4 py-3 rounded-xl bg-celeste-50 border border-celeste-200 focus:outline-none focus:ring-2 focus:ring-black/20 text-black text-sm transition"
      />

      <!-- Password -->
      <input
        [(ngModel)]="password"
        type="password"
        placeholder="Password"
        class="w-full px-4 py-3 rounded-xl bg-celeste-50 border border-celeste-200 focus:outline-none focus:ring-2 focus:ring-black/20 text-black text-sm transition"
      />

      <!-- Confirmar Password -->
      <input
        [(ngModel)]="confirmPassword"
        type="password"
        placeholder="Confirmar password"
        class="w-full px-4 py-3 rounded-xl bg-celeste-50 border border-celeste-200 focus:outline-none focus:ring-2 focus:ring-black/20 text-black text-sm transition"
      />

      <!-- Botón Registrarse -->
      <button
        (click)="register()"
        type="button"
        [disabled]="isLoading"
        class="w-full py-3 rounded-xl bg-blue-700 hover:bg-blue-600 text-white font-medium text-sm active:scale-[0.98] transition"
      >
        {{ isLoading ? 'Registrando...' : 'Registrarse' }}
      </button>

      <!-- Mensajes -->
      <p *ngIf="errorMessage" class="text-red-500 text-sm text-center">
        {{ errorMessage }}
      </p>
      <p *ngIf="successMessage" class="text-green-600 text-sm text-center">
        {{ successMessage }}
      </p>

      <!-- Login -->
      <p class="text-center text-xs text-black/60 mt-6">
        ¿Ya tienes cuenta?
        <a routerLink="/login" class="text-black font-medium hover:underline">
          Inicia sesión
        </a>
      </p>

      <!-- Footer -->
      <div class="text-center text-black/40 text-xs mt-4">
        © 2024 Chinito Importaciones
      </div>

    </div>
  </div>

</div>
