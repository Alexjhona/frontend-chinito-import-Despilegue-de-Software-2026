<div class="login-page min-h-screen flex items-center justify-center bg-gradient-to-br from-celeste-100 to-celeste-200">

  <!-- Card principal -->
  <div class="login-card backdrop-blur-xl bg-white/60 shadow-2xl rounded-3xl p-8 sm:p-10 w-[calc(100%-2rem)] max-w-[360px] border border-white/30">

    <!-- Header -->
    <div class="login-stagger login-delay-1 mb-8 text-center">
      <img src="/logo.png" alt="Chinito Importaciones" class="mx-auto mb-4 h-20 w-20 rounded-2xl object-contain shadow-lg shadow-blue-500/15">
      <h1 class="text-3xl font-semibold text-black">Bienvenido</h1>
      <p class="text-gray-600 text-sm mt-1">
        Login - Chinito Importaciones
      </p>
    </div>

    <!-- Form -->
    <div class="space-y-5">

      <!-- Usuario o correo -->
      <input
        [(ngModel)]="user"
        type="text"
        placeholder="Usuario o correo"
        class="login-stagger login-delay-2 w-full px-4 py-3 rounded-xl bg-celeste-50 border border-celeste-200 focus:outline-none focus:ring-2 focus:ring-black/20 text-black text-sm transition"
      />

      <!-- Contraseña -->
      <input
        [(ngModel)]="password"
        type="password"
        placeholder="Contraseña"
        class="login-stagger login-delay-3 w-full px-4 py-3 rounded-xl bg-celeste-50 border border-celeste-200 focus:outline-none focus:ring-2 focus:ring-black/20 text-black text-sm transition"
      />

      <!-- Botón login -->
      <button
        (click)="login()"
        type="button"
        [disabled]="isLoading"
        [class.is-loading]="isLoading"
        class="login-stagger login-delay-4 login-button w-full py-3 rounded-xl bg-blue-700 hover:bg-blue-600 text-white font-medium text-sm active:scale-[0.98] transition"
      >
        <span *ngIf="isLoading" class="login-spinner" aria-hidden="true"></span>
        <span class="login-button-label">{{ isLoading ? 'Comprobando...' : 'Iniciar sesion' }}</span>
      </button>

      <!-- Error -->
      <p *ngIf="errorMessage" class="login-error text-red-500 text-sm text-center">
        {{ errorMessage }}
      </p>

      <!-- Footer -->
      <div class="login-stagger login-delay-6 text-center text-black/40 text-xs mt-4">
        © 2024 Chinito Importaciones
      </div>

    </div>
  </div>

</div>
